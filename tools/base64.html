<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base64 编解码</title>
  <style>

      --card: #fdfcfa;
      --ink: #3a342c;
      --ink-soft: #6b6358;
      --line: rgba(58, 52, 44, 0.12);

      --accent-hover: #4a4339;

<body>
  <p class="nav-back"><a href="{{ site.baseurl }}/tools/">← 返回工具</a></p>
  <h1>Base64 编解码</h1>

  <div class="sheet">
    <label class="block" for="input">请输入要进行 Base64 编码或解码的字符</label>
    <textarea id="input" placeholder="在此输入原文或 Base64 字符串…"></textarea>

    <div class="toolbar">
      <button type="button" class="btn btn-primary" id="btnEncode">编码 (Encode)</button>
      <button type="button" class="btn btn-outline" id="btnDecode">解码 (Decode)</button>
      <button type="button" class="btn btn-outline" id="btnSwap" title="交换输入与输出">交换</button>
      <span class="hint">快捷键 <kbd>ctrl</kbd> + <kbd>Enter</kbd> 执行编码</span>
    </div>
  </div>

  <div class="sheet">
    <div class="out-row">
      <label class="block" for="output" style="margin:0;">Base64 编码或解码的结果</label>
      <label class="checkbox-row"><input type="checkbox" id="autoSelect"> 编码后自动全选</label>
    </div>
    <textarea id="output" readonly placeholder="结果将显示在此…"></textarea>
  </div>

  <script>
    (function () {
      var input = document.getElementById('input');
      var output = document.getElementById('output');
      var autoSelect = document.getElementById('autoSelect');

      function utf8ToBase64(str) {
        return btoa(unescape(encodeURIComponent(str)));
      }
      function base64ToUtf8(str) {
        var s = str.replace(/\s/g, '');
        return decodeURIComponent(escape(atob(s)));
      }

      document.getElementById('btnEncode').onclick = function () {
        try {
          output.value = utf8ToBase64(input.value);
          if (autoSelect.checked) {
            output.focus();
            output.select();
          }
        } catch (e) {
          output.value = '编码失败：' + (e && e.message ? e.message : String(e));
        }
      };

      document.getElementById('btnDecode').onclick = function () {
        try {
          output.value = base64ToUtf8(input.value);
        } catch (e) {
          output.value = '解码失败：请检查是否为有效的 Base64 字符串。';
        }
      };

      document.getElementById('btnSwap').onclick = function () {
        var t = input.value;
        input.value = output.value;
        output.value = t;
      };

      document.addEventListener('keydown', function (e) {
        if (e.ctrlKey && e.key === 'Enter') {
          e.preventDefault();
          document.getElementById('btnEncode').click();
        }
      });
    })();
  </script>
</body>
</html>

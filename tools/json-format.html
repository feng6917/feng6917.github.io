<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON格式化与可视化工具</title>
    <style>
        :root {
            --paper: #f6f2eb;
            --card: #fdfcfa;
            --ink: #3a342c;
            --ink-soft: #6b6358;
            --line: rgba(58, 52, 44, 0.12);
            --accent: #5c5347;
            --mono: "JetBrains Mono", Consolas, "Sarasa Mono SC", monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", Georgia, serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
            padding: 24px 18px 40px;
            line-height: 1.65;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            position: relative;
        }

        header {
            text-align: left;
            margin-bottom: 22px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--line);
        }

        h1 {
            font-size: 1.65rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
            color: var(--ink);
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--ink-soft);
            font-weight: 400;
        }

        .content {
            display: flex;
            gap: 0;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 10px;
            box-shadow: 0 2px 24px rgba(58, 52, 44, 0.06);
            overflow: hidden;
            min-height: 560px;
        }

        @media (max-width: 768px) {
            .content {
                flex-direction: column;
            }

            .input-section {
                border-right: none;
                border-bottom: 1px solid var(--line);
            }
        }

        .input-section,
        .output-section {
            flex: 1;
            padding: 22px 24px;
            display: flex;
            flex-direction: column;
        }

        .input-section {
            border-right: 1px solid var(--line);
        }

        .section-title {
            font-size: 1.05rem;
            margin-bottom: 14px;
            color: var(--ink);
            font-weight: 600;
            letter-spacing: 0.04em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        textarea {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 6px;
            font-size: 13px;
            resize: none;
            transition: border-color 0.2s, background 0.2s;
            font-family: var(--mono);
            line-height: 1.55;
            background: #faf8f5;
            color: var(--ink);
        }

        textarea:focus {
            border-color: rgba(92, 83, 71, 0.45);
            outline: none;
            background: var(--card);
        }

        .controls {
            display: flex;
            gap: 8px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        button {
            padding: 8px 16px;
            background: #6b6358;
            color: #faf8f5;
            border: 1px solid rgba(58, 52, 44, 0.15);
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            font-weight: 600;
            font-size: 12px;
            font-family: inherit;
            letter-spacing: 0.04em;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        button:hover {
            background: #5c5347;
        }

        button.format {
            background: #4d6b55;
        }

        button.format:hover {
            background: #3f5a46;
        }

        button.clear {
            background: #8b5a52;
        }

        button.clear:hover {
            background: #744a43;
        }

        button.expand-all {
            background: #5a5f8a;
        }

        button.expand-all:hover {
            background: #4a4e72;
        }

        button.collapse-all {
            background: #8a7a4a;
        }

        button.collapse-all:hover {
            background: #6f623c;
        }

        .output-area {
            flex: 1;
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 14px 16px;
            overflow: auto;
            background: #f0ebe3;
            font-family: var(--mono);
            font-size: 13px;
            line-height: 1.55;
            color: var(--ink);
            transition: border-color 0.2s;
        }

        .output-area:focus {
            border-color: rgba(92, 83, 71, 0.45);
            outline: none;
        }

        .json-key {
            color: #8b4d47;
            font-weight: 600;
        }

        .json-string {
            color: #4d6b55;
        }

        .json-number {
            color: #4a6670;
        }

        .json-boolean {
            color: #6b5a8a;
        }

        .json-null {
            color: #8a8278;
        }

        .json-punctuation {
            color: #5c5650;
        }

        .collapsible {
            cursor: pointer;
            position: relative;
            padding-left: 18px;
            user-select: none;
        }

        .collapsible::before {
            content: '▼';
            position: absolute;
            left: 0;
            color: var(--accent);
            font-weight: bold;
            font-size: 11px;
            transition: transform 0.2s;
        }

        .collapsible.collapsed::before {
            transform: rotate(-90deg);
        }

        .collapsible-content {
            padding-left: 20px;
            border-left: 1px dashed rgba(58, 52, 44, 0.18);
            margin-left: 5px;
            transition: all 0.3s;
        }

        .dark-theme .collapsible-content {
            border-left-color: rgba(232, 228, 220, 0.15);
        }

        .collapsed>.collapsible-content {
            display: none;
        }

        .json-item {
            margin: 2px 0;
        }

        .error {
            color: #7a3d38;
            font-weight: 600;
            padding: 10px 12px;
            background: #f5e9e7;
            border-radius: 6px;
            margin-top: 10px;
            border-left: 3px solid #9c6c65;
            font-size: 13px;
        }

        .success {
            color: #3d5a42;
            font-weight: 600;
            padding: 10px 12px;
            background: #e8f0e9;
            border-radius: 6px;
            margin-top: 10px;
            border-left: 3px solid #6d8f74;
            font-size: 13px;
        }

        .stats {
            margin-top: 14px;
            padding: 12px 14px;
            background: #ebe4da;
            border-radius: 6px;
            font-size: 12px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 8px;
            border: 1px solid var(--line);
        }

        .stats div {
            margin: 5px 0;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px dashed #ccc;
        }

        .stat-value {
            font-weight: 600;
            color: var(--ink);
        }

        footer {
            text-align: center;
            margin-top: 26px;
            color: var(--ink-soft);
            font-size: 12px;
            letter-spacing: 0.04em;
        }

        .icon {
            display: inline-block;
            width: 20px;
            text-align: center;
        }

        .json-line {
            display: flex;
            align-items: flex-start;
        }

        .empty-array,
        .empty-object {
            color: #95a5a6;
            font-style: italic;
        }

        .copy-btn {
            background: var(--accent);
            margin-left: auto;
        }

        .copy-btn:hover {
            background: #4a4339;
        }

        .theme-toggle {
            position: absolute;
            top: 0;
            right: 0;
            background: #ebe4da;
            border: 1px solid var(--line);
            border-radius: 8px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--ink);
            font-size: 1.1rem;
        }

        .theme-toggle:hover {
            background: #e0d8cc;
        }

        .dark-theme {
            background: #2a2826;
            color: #e8e4dc;
        }

        .dark-theme header {
            border-bottom-color: rgba(232, 228, 220, 0.12);
        }

        .dark-theme h1 {
            color: #e8e4dc;
        }

        .dark-theme .subtitle {
            color: #a8a29a;
        }

        .dark-theme .content {
            background: #32302e;
            color: #e8e4dc;
            border-color: rgba(232, 228, 220, 0.1);
        }

        .dark-theme .input-section {
            border-right-color: rgba(232, 228, 220, 0.1);
        }

        .dark-theme .output-area {
            background: #262422;
            color: #ddd8cf;
            border-color: rgba(232, 228, 220, 0.12);
        }

        .dark-theme .json-key {
            color: #d4a59a;
        }

        .dark-theme .json-string {
            color: #9cb89f;
        }

        .dark-theme .json-number {
            color: #9ab5c4;
        }

        .dark-theme .json-boolean {
            color: #b9a8d4;
        }

        .dark-theme .json-punctuation {
            color: #a8a29a;
        }

        .dark-theme .stats {
            background: #2e2c2a;
            color: #ddd8cf;
            border-color: rgba(232, 228, 220, 0.1);
        }

        .dark-theme textarea {
            background: #262422;
            color: #ddd8cf;
            border-color: rgba(232, 228, 220, 0.12);
        }

        .dark-theme .section-title {
            color: #e8e4dc;
        }

        .dark-theme .theme-toggle {
            background: #3d3a37;
            color: #e8e4dc;
            border-color: rgba(232, 228, 220, 0.15);
        }

        .dark-theme .theme-toggle:hover {
            background: #4a4744;
        }

        .dark-theme footer {
            color: #a8a29a;
        }

        .nav-back {
            margin-bottom: 12px;
            text-align: left;
        }

        .nav-back a {
            color: var(--ink-soft);
            text-decoration: none;
            font-size: 13px;
            border-bottom: 1px solid rgba(107, 99, 88, 0.35);
            padding-bottom: 1px;
        }

        .nav-back a:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        .dark-theme .nav-back a {
            color: #a8a29a;
            border-bottom-color: rgba(168, 162, 154, 0.4);
        }

        .dark-theme .nav-back a:hover {
            color: #ddd8cf;
        }
    </style>
</head>

<body>
    <div class="container">
        <p class="nav-back"><a href="{{ site.baseurl }}/tools/">← 返回工具</a></p>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>

        <header>
            <h1>JSON格式化与可视化工具</h1>
            <p class="subtitle">输入JSON字符串，实时格式化并支持折叠查看</p>
        </header>

        <div class="content">
            <div class="input-section">
                <h2 class="section-title"><span class="icon">📥</span> JSON输入</h2>
                <div class="input-area">
                    <textarea id="jsonInput"
                        placeholder='在此处输入JSON字符串，例如：{"name": "John", "age": 30, "hobbies": ["reading", "gaming"], "address": {"city": "Beijing", "country": "China"}}'>{
  "users": [
    {
      "id": 1,
      "name": "张三",
      "age": 28,
      "email": "zhangsan@example.com",
      "active": true,
      "profile": {
        "bio": "全栈开发工程师",
        "skills": ["JavaScript", "Python", "Go"],
        "experience": 5
      }
    },
    {
      "id": 2,
      "name": "李四",
      "age": 32,
      "email": "lisi@example.com",
      "active": false,
      "profile": {
        "bio": "数据科学家",
        "skills": ["Python", "R", "SQL"],
        "experience": 7
      }
    }
  ],
  "total": 2,
  "success": true
}</textarea>
                    <div class="controls">
                        <button class="format" onclick="formatJSON()"><span class="icon">✨</span> 格式化JSON</button>
                        <button class="expand-all" onclick="expandAll()"><span class="icon">📂</span> 全部展开</button>
                        <button class="collapse-all" onclick="collapseAll()"><span class="icon">📁</span> 全部折叠</button>
                        <button class="clear" onclick="clearInput()"><span class="icon">🗑️</span> 清空输入</button>
                    </div>
                </div>
            </div>

            <div class="output-section">
                <h2 class="section-title"><span class="icon">📤</span> 格式化输出</h2>
                <div class="controls">
                    <button class="copy-btn" onclick="copyOutput()"><span class="icon">📋</span> 复制JSON</button>
                </div>
                <div class="output-area" id="jsonOutput" tabindex="0">
                    <!-- 格式化后的JSON将在这里显示 -->
                </div>
                <div class="stats" id="jsonStats">
                    <!-- JSON统计信息将在这里显示 -->
                </div>
            </div>
        </div>

        <footer>
            <p>JSON格式化工具 &copy; 2023 | 支持折叠展开、语法高亮、实时验证、主题切换</p>
        </footer>
    </div>

    <script>
        // 页面加载时自动格式化示例JSON
        document.addEventListener('DOMContentLoaded', function () {
            formatJSON();
        });

        // 当前JSON对象，用于操作
        let currentJsonObj = null;

        // 格式化JSON函数
        function formatJSON() {
            const input = document.getElementById('jsonInput').value;
            const output = document.getElementById('jsonOutput');
            const stats = document.getElementById('jsonStats');

            // 清空输出区域
            output.innerHTML = '';
            stats.innerHTML = '';

            if (!input.trim()) {
                output.innerHTML = '<div class="error">请输入JSON字符串</div>';
                return;
            }

            try {
                // 解析JSON
                currentJsonObj = JSON.parse(input);

                // 创建格式化后的JSON显示
                const formattedJSON = createFormattedJSON(currentJsonObj);
                output.appendChild(formattedJSON);

                // 显示统计信息
                displayStats(currentJsonObj);

                // 显示成功消息
                const successMsg = document.createElement('div');
                successMsg.className = 'success';
                successMsg.textContent = 'JSON格式正确！';
                stats.insertBefore(successMsg, stats.firstChild);

            } catch (error) {
                output.innerHTML = `<div class="error">JSON格式错误: ${error.message}</div>`;
            }
        }

        // 创建格式化JSON的DOM元素
        function createFormattedJSON(obj, isRoot = true) {
            const container = document.createElement('div');

            if (Array.isArray(obj)) {
                // 处理数组
                if (obj.length === 0) {
                    container.innerHTML = '<span class="json-punctuation">[</span><span class="empty-array">空数组</span><span class="json-punctuation">]</span>';
                    return container;
                }

                const collapsible = document.createElement('div');
                collapsible.className = 'collapsible json-item';

                const prefix = document.createElement('span');
                prefix.className = 'json-punctuation';
                prefix.textContent = '[';
                collapsible.appendChild(prefix);

                const content = document.createElement('div');
                content.className = 'collapsible-content';

                obj.forEach((item, index) => {
                    const itemElement = createFormattedJSON(item, false);
                    content.appendChild(itemElement);

                    // 添加逗号（除了最后一个元素）
                    if (index < obj.length - 1) {
                        const comma = document.createElement('span');
                        comma.className = 'json-punctuation';
                        comma.textContent = ',';
                        content.appendChild(comma);
                    }
                });

                collapsible.appendChild(content);

                const suffix = document.createElement('span');
                suffix.className = 'json-punctuation';
                suffix.textContent = ']';
                collapsible.appendChild(suffix);

                // 添加点击折叠/展开功能
                collapsible.addEventListener('click', function (e) {
                    // 防止点击子元素时触发折叠
                    if (e.target === this || e.target === prefix) {
                        this.classList.toggle('collapsed');
                    }
                });

                container.appendChild(collapsible);

            } else if (obj !== null && typeof obj === 'object') {
                // 处理对象
                const keys = Object.keys(obj);
                if (keys.length === 0) {
                    container.innerHTML = '<span class="json-punctuation">{</span><span class="empty-object">空对象</span><span class="json-punctuation">}</span>';
                    return container;
                }

                const collapsible = document.createElement('div');
                collapsible.className = 'collapsible json-item';

                const prefix = document.createElement('span');
                prefix.className = 'json-punctuation';
                prefix.textContent = '{';
                collapsible.appendChild(prefix);

                const content = document.createElement('div');
                content.className = 'collapsible-content';

                keys.forEach((key, index) => {
                    const line = document.createElement('div');
                    line.className = 'json-line';

                    const keyElement = document.createElement('span');
                    keyElement.innerHTML = `<span class="json-key">"${key}"</span><span class="json-punctuation">: </span>`;
                    line.appendChild(keyElement);

                    const valueElement = createFormattedJSON(obj[key], false);
                    line.appendChild(valueElement);

                    // 添加逗号（除了最后一个元素）
                    if (index < keys.length - 1) {
                        const comma = document.createElement('span');
                        comma.className = 'json-punctuation';
                        comma.textContent = ',';
                        line.appendChild(comma);
                    }

                    content.appendChild(line);
                });

                collapsible.appendChild(content);

                const suffix = document.createElement('span');
                suffix.className = 'json-punctuation';
                suffix.textContent = '}';
                collapsible.appendChild(suffix);

                // 添加点击折叠/展开功能
                collapsible.addEventListener('click', function (e) {
                    // 防止点击子元素时触发折叠
                    if (e.target === this || e.target === prefix) {
                        this.classList.toggle('collapsed');
                    }
                });

                container.appendChild(collapsible);

            } else {
                // 处理基本类型
                const valueElement = document.createElement('span');

                if (typeof obj === 'string') {
                    valueElement.className = 'json-string';
                    valueElement.textContent = `"${obj}"`;
                } else if (typeof obj === 'number') {
                    valueElement.className = 'json-number';
                    valueElement.textContent = obj;
                } else if (typeof obj === 'boolean') {
                    valueElement.className = 'json-boolean';
                    valueElement.textContent = obj;
                } else if (obj === null) {
                    valueElement.className = 'json-null';
                    valueElement.textContent = 'null';
                }

                container.appendChild(valueElement);
            }

            return container;
        }

        // 显示JSON统计信息
        function displayStats(obj) {
            const stats = document.getElementById('jsonStats');
            let objectCount = 0;
            let arrayCount = 0;
            let stringCount = 0;
            let numberCount = 0;
            let booleanCount = 0;
            let nullCount = 0;
            let totalKeys = 0;

            function traverse(obj) {
                if (Array.isArray(obj)) {
                    arrayCount++;
                    obj.forEach(item => traverse(item));
                } else if (obj !== null && typeof obj === 'object') {
                    objectCount++;
                    const keys = Object.keys(obj);
                    totalKeys += keys.length;
                    Object.values(obj).forEach(value => traverse(value));
                } else if (typeof obj === 'string') {
                    stringCount++;
                } else if (typeof obj === 'number') {
                    numberCount++;
                } else if (typeof obj === 'boolean') {
                    booleanCount++;
                } else if (obj === null) {
                    nullCount++;
                }
            }

            traverse(obj);

            const totalItems = objectCount + arrayCount + stringCount + numberCount + booleanCount + nullCount;

            stats.innerHTML = `
                <div class="stat-item"><span>总元素数:</span> <span class="stat-value">${totalItems}</span></div>
                <div class="stat-item"><span>对象:</span> <span class="stat-value">${objectCount}</span></div>
                <div class="stat-item"><span>数组:</span> <span class="stat-value">${arrayCount}</span></div>
                <div class="stat-item"><span>字符串:</span> <span class="stat-value">${stringCount}</span></div>
                <div class="stat-item"><span>数字:</span> <span class="stat-value">${numberCount}</span></div>
                <div class="stat-item"><span>布尔值:</span> <span class="stat-value">${booleanCount}</span></div>
                <div class="stat-item"><span>Null:</span> <span class="stat-value">${nullCount}</span></div>
                <div class="stat-item"><span>总键数:</span> <span class="stat-value">${totalKeys}</span></div>
            `;
        }

        // 清空输入
        function clearInput() {
            document.getElementById('jsonInput').value = '';
            document.getElementById('jsonOutput').innerHTML = '';
            document.getElementById('jsonStats').innerHTML = '';
            currentJsonObj = null;
        }

        // 全部展开
        function expandAll() {
            const collapsibles = document.querySelectorAll('.collapsible');
            collapsibles.forEach(el => {
                el.classList.remove('collapsed');
            });
        }

        // 全部折叠
        function collapseAll() {
            const collapsibles = document.querySelectorAll('.collapsible');
            collapsibles.forEach(el => {
                el.classList.add('collapsed');
            });
        }

        // 复制输出
        function copyOutput() {
            if (!currentJsonObj) {
                alert('没有可复制的JSON内容');
                return;
            }

            const jsonString = JSON.stringify(currentJsonObj, null, 2);
            navigator.clipboard.writeText(jsonString).then(() => {
                // 显示复制成功提示
                const btn = document.querySelector('.copy-btn');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<span class="icon">✅</span> 已复制';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                }, 2000);
            }).catch(err => {
                console.error('复制失败: ', err);
                alert('复制失败，请手动复制');
            });
        }

        // 切换主题
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            const themeBtn = document.querySelector('.theme-toggle');
            if (document.body.classList.contains('dark-theme')) {
                themeBtn.textContent = '☀️';
            } else {
                themeBtn.textContent = '🌙';
            }
        }

        // 添加实时格式化功能（带防抖）
        document.getElementById('jsonInput').addEventListener('input', function () {
            clearTimeout(this.timer);
            this.timer = setTimeout(formatJSON, 500);
        });

        // 添加键盘快捷键
        document.addEventListener('keydown', function (e) {
            // Ctrl+Enter 格式化
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                formatJSON();
            }

            // Ctrl+E 全部展开
            if (e.ctrlKey && e.key === 'e') {
                e.preventDefault();
                expandAll();
            }

            // Ctrl+C 全部折叠
            if (e.ctrlKey && e.key === 'c') {
                e.preventDefault();
                collapseAll();
            }
        });
    </script>
</body>

</html>
